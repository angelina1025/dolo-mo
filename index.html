<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dolo ERP系統</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Babel for JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- XLSX Library (SheetJS) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <!-- JSZip & FileSaver (用於打包備份) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <!-- html2canvas (用於將報表轉為圖片) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- React & ReactDOM (UMD 版本，支援 file:// 直接開啟) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        /* 一般樣式 */
        .icon-emoji { display: inline-block; width: 1.25rem; text-align: center; margin-right: 0.5rem; }

        /* 錯誤訊息樣式 */
        #error-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 9999; padding: 2rem; color: #dc2626; overflow: auto; }

        /* --- 列印專用樣式 (A4 最佳化) --- */
        @media print {
            @page {
                size: A4 portrait; /* 強制 A4 直向 */
                margin: 1cm;       /* 設定邊界 */
            }

            body {
                background: white;
                font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
                font-size: 11pt;
                color: black;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            /* 隱藏網頁介面元素 */
            .print\:hidden,
            .sidebar-container,
            button,
            .no-print {
                display: none !important;
            }

            /* 重置 Modal 樣式 */
            .fixed.inset-0 {
                position: static !important;
                z-index: auto !important;
                background: white !important;
                padding: 0 !important;
                display: block !important;
                width: 100% !important;
                height: auto !important;
            }

            .bg-white.rounded-lg.shadow-2xl, .bg-white.rounded-xl {
                box-shadow: none !important;
                border: none !important;
                border-radius: 0 !important;
                max-width: none !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            /* 表格列印優化 */
            table {
                width: 100% !important;
                border-collapse: collapse !important;
                margin-top: 5px;
                margin-bottom: 10px;
            }

            th, td {
                border: 1px solid #000 !important;
                padding: 4px 6px !important;
                color: #000 !important;
            }

            /* 報價單特定樣式 */
            .quotation-header {
                display: flex !important;
                justify-content: space-between !important;
                align-items: center !important;
                border-bottom: 2px solid #000;
                margin-bottom: 10px;
                padding-bottom: 10px;
            }

            .quotation-grid {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 10px !important;
                margin-bottom: 15px !important;
            }

            .quotation-footer-grid {
                display: grid !important;
                grid-template-columns: 3fr 2fr !important;
                gap: 20px !important;
                margin-top: 10px !important;
            }

            .text-red-500, .text-blue-600, .text-gray-500 {
                color: black !important;
            }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">
    <div id="root" class="flex items-center justify-center h-screen text-gray-500">
        <div class="text-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"></div>
            <p>系統載入中...</p>
        </div>
    </div>

    <div id="error-overlay">
        <h1 class="text-2xl font-bold mb-4">系統發生錯誤</h1>
        <pre id="error-message" class="bg-gray-100 p-4 rounded border border-red-200"></pre>
    </div>

    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const overlay = document.getElementById('error-overlay');
            const message = document.getElementById('error-message');
            overlay.style.display = 'block';
            message.textContent = `Error: ${msg}\nLine: ${lineNo}\nFile: ${url}`;
            return false;
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const BONUS_RATIOS = {
            dept: 0.55, company: 0.45, coo: 0.30, admin: 0.10, marketing: 0.05,
            design: 0.05, tech: 0.05, opCost: 0.25, dividends: 0.15, reserve: 0.05
        };

        const DEPARTMENTS_CONFIG = [
            { id: 'coo', name: '總營運長', ratio: 30, key: 'coo' },
            { id: 'admin', name: '會計行政&業務派工', ratio: 10, key: 'admin' },
            { id: 'marketing', name: '系統維護&行銷管理', ratio: 5, key: 'marketing' },
            { id: 'design', name: '美編設計&社群管理', ratio: 5, key: 'design' },
            { id: 'tech', name: '技術主管', ratio: 5, key: 'tech' }
        ];

        // --- Utility Functions ---
        const loadXLSX = () => {
            return new Promise((resolve) => {
                if (window.XLSX) { resolve(window.XLSX); return; }
                const check = setInterval(() => {
                    if (window.XLSX) { clearInterval(check); resolve(window.XLSX); }
                }, 100);
            });
        };

        const formatExcelDate = (input) => {
            if (!input) return '';
            if (input instanceof Date) {
                if (isNaN(input.getTime())) return '';
                const year = input.getFullYear();
                const month = String(input.getMonth() + 1).padStart(2, '0');
                const day = String(input.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
            if (typeof input === 'number') {
                const date = new Date(Math.round((input - 25569) * 86400 * 1000));
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }
            if (typeof input === 'string') {
                const cleanInput = input.trim();
                const date = new Date(cleanInput);
                if (!isNaN(date.getTime())) {
                    const year = date.getFullYear();
                    const month = String(date.getMonth() + 1).padStart(2, '0');
                    const day = String(date.getDate()).padStart(2, '0');
                    return `${year}-${month}-${day}`;
                }
                return input;
            }
            return '';
        };

        const getFuzzyValue = (row, ...candidates) => {
            const keys = Object.keys(row);
            for (const candidate of candidates) {
                if (row[candidate] !== undefined) return row[candidate];
                const trimKey = keys.find(k => k.trim() === candidate);
                if (trimKey && row[trimKey] !== undefined) return row[trimKey];
                const fuzzyKey = keys.find(k => k.includes(candidate));
                if (fuzzyKey && row[fuzzyKey] !== undefined) return row[fuzzyKey];
            }
            return '';
        };

        // --- Login Component ---
        const Login = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                // Hardcoded credentials as requested
                if (email === 'artemis19981025@gmail.com' && password === 'artemis19981025') {
                    onLogin();
                } else {
                    setError('帳號或密碼錯誤');
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-gray-100 font-sans">
                    <div className="bg-white p-10 rounded-xl shadow-2xl max-w-md w-full border border-gray-200">
                        <div className="text-center mb-8">
                            <span className="text-5xl mb-4 block">🔒</span>
                            <h2 className="text-2xl font-bold text-gray-800">Dolo ERP 系統登入</h2>
                            <p className="text-gray-500 mt-2 text-sm">請輸入授權帳號密碼以存取系統</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">帳號 (Email)</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                    placeholder="name@example.com"
                                    required
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">密碼</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                    placeholder="••••••••"
                                    required
                                />
                            </div>
                            {error && <div className="text-red-500 text-sm text-center bg-red-50 p-3 rounded border border-red-100 animate-pulse">{error}</div>}
                            <button
                                type="submit"
                                className="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition-colors shadow-lg hover:shadow-xl transform hover:-translate-y-0.5"
                            >
                                登入系統
                            </button>
                        </form>
                        <div className="mt-6 text-center text-xs text-gray-400">
                            &copy; Dolo ERP System. All rights reserved.
                        </div>
                    </div>
                </div>
            );
        };

        // --- Quotation Manager Component (Updated with Logo Upload) ---
        const QuotationManager = () => {
            const [quotation, setQuotation] = useState({
                customerName: '',
                contactPerson: '',
                phone: '',
                address: '',
                masterName: '陳建行',
                masterPhone: '0933337255',
                quoteDate: new Date().toISOString().slice(0, 10),
                validDate: new Date(new Date().setDate(new Date().getDate() + 14)).toISOString().slice(0, 10),
                items: [
                    { id: 1, name: '衛浴防水層堵漏施工費用', quantity: 1, price: 35000 }
                ],
                taxRate: 5,
                discount: 0,
                bankAccountName: '訢裔商記',
                bankCode: '822 中國信託銀行',
                bankAccount: '196-540263619',
                terms: [
                    '以上報價金額不含稅金,如需要發票另加5%營業稅',
                    '預收30% 訂金使安排施工,施工完畢後收取剩餘款項',
                    '本估價單有效期限14日(含例假日)'
                ],
                remarks: `備註 :
檢測現場由甲方代表（客戶）、乙方師傅共同確認，完成檢測流程後由客戶簽核。
每步驟記錄具體方法及結果，留存現場照片供追查。
若發現重大安全疑慮或緊急狀況，應即通報主管，並暫停相關作業待指示。
檢測後如無法即時判斷漏水原因，應提出後續補充檢測措施方案供客戶斟酌。
客戶確認檢測/修復成果後，應依照系統簽名完結。
若因現場環境、設備影響檢測結果，需明列於報告中並由主管補充說明，避免爭議。
本備註表列旨在保證工程公正透明，事前預防組織責任及利害關係衍生風險，有助事後管理與確保客戶及主管雙重認可。`
            });

            // Logo State
            const [logo, setLogo] = useState(null);

            // Load logo from local storage on mount
            useEffect(() => {
                const savedLogo = localStorage.getItem('dolo_erp_logo');
                if (savedLogo) {
                    setLogo(savedLogo);
                }
            }, []);

            const handleLogoUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const result = e.target.result;
                        setLogo(result);
                        localStorage.setItem('dolo_erp_logo', result); // Save to storage
                    };
                    reader.readAsDataURL(file);
                }
            };

            const removeLogo = (e) => {
                e.stopPropagation(); // Prevent triggering label click
                if(window.confirm('確定要移除自訂 Logo 嗎？')) {
                    setLogo(null);
                    localStorage.removeItem('dolo_erp_logo');
                }
            };

            const handleItemChange = (id, field, value) => {
                const newItems = quotation.items.map(item =>
                    item.id === id ? { ...item, [field]: value } : item
                );
                setQuotation({ ...quotation, items: newItems });
            };

            const addItem = () => {
                const newId = Math.max(...quotation.items.map(i => i.id), 0) + 1;
                setQuotation({
                    ...quotation,
                    items: [...quotation.items, { id: newId, name: '', quantity: 1, price: 0 }]
                });
            };

            const removeItem = (id) => {
                setQuotation({
                    ...quotation,
                    items: quotation.items.filter(i => i.id !== id)
                });
            };

            const subtotal = quotation.items.reduce((acc, item) => acc + (item.quantity * item.price), 0);
            const tax = Math.round((subtotal - quotation.discount) * (quotation.taxRate / 100));
            const total = subtotal - quotation.discount + tax;

            const handlePrint = () => {
                window.print();
            };

            return (
                <div className="p-8 animate-in fade-in max-w-5xl mx-auto">
                    {/* 操作列 (列印時隱藏) */}
                    <div className="flex justify-between items-center mb-6 print:hidden">
                        <h2 className="text-2xl font-bold text-gray-800 flex items-center">
                            <span className="mr-2">📝</span>報價單系統
                        </h2>
                        <div className="flex space-x-3">
                            <button onClick={handlePrint} className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md flex items-center">
                                <span className="mr-2">🖨️</span> 列印報價單 (A4)
                            </button>
                        </div>
                    </div>

                    {/* 報價單預覽/編輯區域 */}
                    <div className="bg-white shadow-lg p-8 rounded-xl border border-gray-200 print:shadow-none print:border-none print:p-0">
                        {/* Header */}
                        <div className="quotation-header flex justify-between items-start mb-6 border-b-2 border-gray-800 pb-4">
                            <div className="flex items-center">
                                {/* Logo Section with Upload */}
                                <div className="mr-4 relative group">
                                    {logo ? (
                                        <div className="relative">
                                            <img src={logo} alt="Logo" className="h-24 w-auto object-contain max-w-[200px]" />
                                            <button
                                                onClick={removeLogo}
                                                className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full w-6 h-6 flex items-center justify-center text-sm shadow-md print:hidden opacity-0 group-hover:opacity-100 transition-opacity"
                                                title="移除圖片"
                                            >
                                                ✕
                                            </button>
                                        </div>
                                    ) : (
                                        <label className="cursor-pointer block relative group">
                                            <div className="w-20 h-20 bg-red-600 rounded-full flex items-center justify-center text-white font-bold text-3xl border-4 border-blue-400 print:border-black print:text-black print:bg-transparent">
                                                DOLO
                                            </div>
                                            <div className="absolute inset-0 bg-black bg-opacity-50 rounded-full flex items-center justify-center text-white text-xs opacity-0 group-hover:opacity-100 transition-opacity print:hidden">
                                                點擊<br/>上傳
                                            </div>
                                            <input type="file" accept="image/*" onChange={handleLogoUpload} className="hidden" />
                                        </label>
                                    )}
                                </div>
                                <div>
                                    <h1 className="text-3xl font-bold text-gray-900">杊沐森-DOLO團隊</h1>
                                    <div className="text-xl font-bold mt-2 border-l-4 border-gray-800 pl-3">報價單</div>
                                </div>
                            </div>
                            <div className="text-right text-sm">
                                <div className="mb-1"><span className="font-bold">統一編號：</span><input type="text" className="border-b border-gray-300 focus:outline-none w-32 text-right print:border-none" placeholder="輸入統編" /></div>
                                <div><span className="font-bold">列印日期：</span>{new Date().toLocaleDateString()}</div>
                            </div>
                        </div>

                        {/* Info Grid */}
                        <div className="quotation-grid grid grid-cols-2 gap-8 mb-6">
                            <div className="space-y-3">
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">客戶名稱：</span>
                                    <input type="text" value={quotation.customerName} onChange={e => setQuotation({...quotation, customerName: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" placeholder="請輸入客戶名稱" />
                                </div>
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">聯絡人：</span>
                                    <input type="text" value={quotation.contactPerson} onChange={e => setQuotation({...quotation, contactPerson: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" placeholder="聯絡人姓名" />
                                </div>
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">電話：</span>
                                    <input type="text" value={quotation.phone} onChange={e => setQuotation({...quotation, phone: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" placeholder="聯絡電話" />
                                </div>
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">地址：</span>
                                    <input type="text" value={quotation.address} onChange={e => setQuotation({...quotation, address: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" placeholder="施工/聯絡地址" />
                                </div>
                            </div>
                            <div className="space-y-3">
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">DOLO師傅：</span>
                                    <input type="text" value={quotation.masterName} onChange={e => setQuotation({...quotation, masterName: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" />
                                </div>
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">師傅電話：</span>
                                    <input type="text" value={quotation.masterPhone} onChange={e => setQuotation({...quotation, masterPhone: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" />
                                </div>
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">報價日期：</span>
                                    <input type="date" value={quotation.quoteDate} onChange={e => setQuotation({...quotation, quoteDate: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" />
                                </div>
                                <div className="flex items-center">
                                    <span className="w-24 font-bold text-gray-700">有效日期：</span>
                                    <input type="date" value={quotation.validDate} onChange={e => setQuotation({...quotation, validDate: e.target.value})} className="flex-1 border-b border-gray-300 focus:border-blue-500 outline-none px-2 py-1 print:border-none" />
                                </div>
                            </div>
                        </div>

                        <div className="text-sm text-gray-500 mb-2 italic print:hidden">※ 詳填估價項目後，若有疑問請電洽聯絡人。</div>

                        {/* Items Table */}
                        <table className="w-full mb-6 border-collapse">
                            <thead>
                                <tr className="bg-gray-100 border-b-2 border-gray-800">
                                    <th className="py-2 px-4 text-left font-bold text-gray-700 border border-gray-300 w-12 print:text-center">#</th>
                                    <th className="py-2 px-4 text-left font-bold text-gray-700 border border-gray-300">項目說明</th>
                                    <th className="py-2 px-4 text-center font-bold text-gray-700 border border-gray-300 w-24">數量</th>
                                    <th className="py-2 px-4 text-right font-bold text-gray-700 border border-gray-300 w-32">單價</th>
                                    <th className="py-2 px-4 text-right font-bold text-gray-700 border border-gray-300 w-32">金額</th>
                                    <th className="py-2 px-4 w-12 border border-gray-300 print:hidden"></th>
                                </tr>
                            </thead>
                            <tbody>
                                {quotation.items.map((item, index) => (
                                    <tr key={item.id} className="border-b border-gray-200">
                                        <td className="py-2 px-4 text-center border border-gray-300">{index + 1}</td>
                                        <td className="py-2 px-4 border border-gray-300">
                                            <input type="text" value={item.name} onChange={e => handleItemChange(item.id, 'name', e.target.value)} className="w-full bg-transparent outline-none" placeholder="輸入項目名稱" />
                                        </td>
                                        <td className="py-2 px-4 border border-gray-300">
                                            <input type="number" value={item.quantity} onChange={e => handleItemChange(item.id, 'quantity', parseFloat(e.target.value) || 0)} className="w-full text-center bg-transparent outline-none" />
                                        </td>
                                        <td className="py-2 px-4 border border-gray-300">
                                            <input type="number" value={item.price} onChange={e => handleItemChange(item.id, 'price', parseFloat(e.target.value) || 0)} className="w-full text-right bg-transparent outline-none" />
                                        </td>
                                        <td className="py-2 px-4 text-right border border-gray-300 font-mono">
                                            ${(item.quantity * item.price).toLocaleString()}
                                        </td>
                                        <td className="py-2 px-4 text-center border border-gray-300 print:hidden">
                                            <button onClick={() => removeItem(item.id)} className="text-red-500 hover:text-red-700">✕</button>
                                        </td>
                                    </tr>
                                ))}
                                <tr className="print:hidden">
                                    <td colSpan="6" className="py-2 px-4 border border-gray-300 bg-gray-50 text-center">
                                        <button onClick={addItem} className="text-blue-600 hover:text-blue-800 font-bold">+ 新增項目</button>
                                    </td>
                                </tr>
                            </tbody>

                        setLocalData(localData.filter(item => item.id !== id));
                    }
                }
            };

            const handleParseBatch = () => {
                if (!batchText) return;
                let parsed = [];
                const regex = /([^\d\s%]+)\s*(\d+)\s*([\d\.]+)%/g;
                let match;
                const cleanText = batchText.replace(/投資人|投資股數|分紅百分比|姓名|股數/g, '').trim();
                while ((match = regex.exec(cleanText)) !== null) {
                    if (match[1].trim()) parsed.push({ name: match[1].trim(), shares: parseFloat(match[2]), ratio: parseFloat(match[3]), role: '' });
                }
                if (parsed.length === 0) {
                    parsed = batchText.split('\n').filter(l => l.trim() !== '' && !l.includes('投資人')).map(line => {
                        const parts = line.split(/[\t\s]+/).filter(p => p.trim() !== '');
                        const name = parts.find(p => isNaN(parseFloat(p)));
                        const numbers = parts.filter(p => !isNaN(parseFloat(p.replace('%', ''))));
                        if (name && numbers.length >= 2) return { name, shares: parseFloat(numbers[0]), ratio: parseFloat(numbers[1].replace('%', '')), role: '' };
                        return null;
                    }).filter(i => i);
                }
                setParsedBatchData(parsed);

        const TaskManager = ({ constructionUnits, salesUnits, tasks, setTasks }) => {

            const recalculateTaskFinancials = (task) => {
                const amount = Number(task.amount);
                const cUnit = constructionUnits.find(u => u.id === task.constructionUnitId) || { name: task.constructionUnitName };
                const sUnit = salesUnits.find(u => u.id === task.salesUnitId) || { name: task.salesUnitName };
                let salesCost = (sUnit.name === 'dolo團隊') ? 0 : Math.round(amount * (task.salesRatio / 100));
                let constructionCost = (cUnit.name === 'dolo團隊') ? Math.round(amount * 0.40) : Math.round(amount * (task.constructionRatio / 100));
                const turnover = amount - salesCost - constructionCost;
                return { salesCost, constructionCost, turnover, isDoloConstruction: cUnit.name === 'dolo團隊', deptBonus: Math.round(turnover * BONUS_RATIOS.dept), companyFunds: Math.round(turnover * BONUS_RATIOS.company) };
            };

            const handleSave = () => {

                    {isEditing && currentTask && (<div className="fixed inset-0 z-[100] bg-gray-500 bg-opacity-75 flex items-center justify-center p-4"><div className="bg-white rounded-lg shadow-xl max-w-md w-full p-6 animate-in zoom-in-95"><h3 className="text-lg font-bold mb-4">編輯任務資料</h3><div className="space-y-4"><div><label className="text-sm">客戶名稱/分類</label><input className="w-full border rounded p-2" value={currentTask.customerName || ''} onChange={e => setCurrentTask({...currentTask, customerName: e.target.value})}/></div><div><label className="text-sm">總金額</label><input type="number" className="w-full border rounded p-2" value={currentTask.amount || 0} onChange={e => setCurrentTask({...currentTask, amount: Number(e.target.value)})}/></div><div className="bg-yellow-50 p-3 rounded-md text-xs text-yellow-800"><span className="mr-1">⚠️</span>系統將依據此新金額，自動重新計算該筆任務的營業額與分紅(依據存檔時的比例)。</div></div><div className="mt-6 flex justify-end space-x-3"><button onClick={() => setIsEditing(false)} className="px-4 py-2 border rounded">取消</button><button onClick={handleSave} className="px-4 py-2 bg-blue-600 text-white rounded">儲存</button></div></div></div>)}

        function App() {
            const [user, setUser] = useState(null);

            const [currentView, setCurrentView] = useState('process');
            const [isSidebarCollapsed, setIsSidebarCollapsed] = useState(false);
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [libReady, setLibReady] = useState(false);
            const [mergedData, setMergedData] = useState([]);
            const [fileName, setFileName] = useState('');
            const [imgProcessing, setImgProcessing] = useState(false);

            const [constructionUnits, setConstructionUnits] = useState([
                { id: 'default_hq', name: 'dolo團隊', isInternal: true, defaultRatio: 40, isDefaultHQ: true }
            ]);
            const [salesUnits, setSalesUnits] = useState([
                { id: 'default_hq', name: 'dolo團隊', isInternal: true, defaultRatio: 0, isDefaultHQ: true }
            ]);

            const [shareholders, setShareholders] = useState([]);
            const [viewingShareholderDetail, setViewingShareholderDetail] = useState(null);

            useEffect(() => {
                setMergedData([]);
                setStep(1);
                setFileName('');
            }, []);

            useEffect(() => {
                const init = async () => {
                    try { await loadXLSX(); setLibReady(true); } catch (e) { setError('無法載入 Excel 解析元件，請重新整理頁面。'); }
                };
                init();
            }, []);

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setLoading(true); setError(''); setFileName(file.name);
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const data = new Uint8Array(event.target.result);
                        const workbook = window.XLSX.read(data, { type: 'array', cellDates: true });
                        if (workbook.SheetNames.length < 2) throw new Error('Excel 檔案至少需包含兩個工作表');
                        const taskList = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], { defval: '' });
                        const reportList = window.XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[1]], { defval: '' });
                        await processAndMergeData(taskList, reportList);
                    } catch (err) { console.error(err); setError(err.message || '檔案解析失敗'); setLoading(false); }
                };
                reader.readAsArrayBuffer(file);
            };

            const processAndMergeData = async (taskList, reportList) => {
                const merged = [];
                const reportMap = new Map();
                reportList.forEach(row => { const id = getFuzzyValue(row, '任務編號'); if (id) reportMap.set(String(id).trim(), row); });

                let currentCUnits = [...constructionUnits];
                let currentSUnits = [...salesUnits];

                const resolveUnit = (name, type) => {
                    const cleanName = (name || '').trim();
                    if (!cleanName || cleanName === 'dolo團隊' || cleanName === '總部') {
                        return { id: 'default_hq', ratio: type === 'c' ? 40 : 0 };
                    }

                    let list = type === 'c' ? currentCUnits : currentSUnits;
                    let existing = list.find(u => u.name === cleanName);

                    if (existing) {
                        return { id: existing.id, ratio: existing.defaultRatio };
                    }

                    const newId = `temp_${type}_${Date.now()}_${Math.random().toString(36).substring(7)}`;
                    const defaultRatio = type === 'c' ? 60 : 10;
                    const newUnit = {
                        id: newId,
                        name: cleanName,
                        defaultRatio: defaultRatio,
                        isInternal: false,
                        phone: '',
                        createdAt: new Date()
                    };

                    if (type === 'c') currentCUnits.push(newUnit);
                    else currentSUnits.push(newUnit);

                    return { id: newId, ratio: defaultRatio };
                };

                taskList.forEach(task => {
                    const taskId = String(getFuzzyValue(task, '任務編號')).trim();
                    if (!taskId) return;
                    const report = reportMap.get(taskId) || {};
                    // 將「全款金額」放在最優先順位
                    let rawAmount = getFuzzyValue(report, '全款金額', '實際收款金額', '實收金額') || '0';
                    if (typeof rawAmount === 'string') rawAmount = rawAmount.replace(/,/g, '');
                    const amount = parseFloat(rawAmount) || 0;
                    const isSelected = amount > 500;
                    const finalDate = formatExcelDate(getFuzzyValue(report, '任務結案日期', '結案日期')) || formatExcelDate(getFuzzyValue(task, '任務結案日期')) || '';

                    const creator = getFuzzyValue(report, '任務建立人') || getFuzzyValue(task, '任務建立人');
                    const closer = getFuzzyValue(report, '任務結案人') || getFuzzyValue(task, '任務結案人');

                    const cUnitData = resolveUnit(closer, 'c');
                    const sUnitData = resolveUnit(creator, 's');

                    merged.push({
                        id: taskId, customerId: getFuzzyValue(task, '客戶編號'), customerName: getFuzzyValue(task, '客戶名稱') || getFuzzyValue(task, '客戶') || '',
                        location: getFuzzyValue(task, '任務地點'), content: getFuzzyValue(task, '任務內容'),
                        status: getFuzzyValue(task, '任務狀態') || '',
                        processStatus: getFuzzyValue(task, '處理狀態'),
                        date: finalDate, responder: getFuzzyValue(report, '回覆人'),
                        creator: creator,
                        closer: closer,
                        category: getFuzzyValue(report, '任務分類') || getFuzzyValue(task, '任務分類') || '', amount: amount,

                        constructionUnitId: cUnitData.id,
                        salesUnitId: sUnitData.id,
                        constructionRatio: cUnitData.ratio,
                        salesRatio: sUnitData.ratio,

                        isDuplicate: false, selected: isSelected, financials: { turnover: 0, salesCost: 0, constructionCost: 0 }
                    });
                });

                merged.sort((a, b) => {
                    const da = a.date ? new Date(a.date).getTime() : 0;
                    const db = b.date ? new Date(b.date).getTime() : 0;
                    return db - da;
                });

                setConstructionUnits(currentCUnits);
                setSalesUnits(currentSUnits);

                setMergedData(merged);
                setLoading(false); setStep(2);
            };

            const updateRowData = (index, field, value) => {
                const newData = [...mergedData]; const row = newData[index]; row[field] = value;
                if (field === 'salesUnitId') {
                    const selectedUnit = salesUnits.find(u => u.id === value);
                    if (selectedUnit) row.salesRatio = (selectedUnit.name === 'dolo團隊') ? 0 : (parseFloat(selectedUnit.defaultRatio) || 0);
                }
                if (field === 'constructionUnitId') {
                    const selectedUnit = constructionUnits.find(u => u.id === value);
                    if (selectedUnit) row.constructionRatio = (selectedUnit.name === 'dolo團隊') ? 40 : (parseFloat(selectedUnit.defaultRatio) || 0);
                }
                setMergedData(newData);
            };

            const calculateFinancials = (row) => {
                const amount = row.amount;
                const cUnit = constructionUnits.find(u => u.id === row.constructionUnitId) || constructionUnits[0] || {};
                const sUnit = salesUnits.find(u => u.id === row.salesUnitId) || salesUnits[0] || {};
                let salesCost = (sUnit.name === 'dolo團隊') ? 0 : Math.round(amount * (row.salesRatio / 100));
                let constructionCost = (cUnit.name === 'dolo團隊') ? Math.round(amount * 0.40) : Math.round(amount * (row.constructionRatio / 100));
                const turnover = amount - salesCost - constructionCost;
                return { salesCost, constructionCost, turnover, isDoloConstruction: cUnit.name === 'dolo團隊', deptBonus: Math.round(turnover * BONUS_RATIOS.dept), companyFunds: Math.round(turnover * BONUS_RATIOS.company) };
            };

            const saveToDatabase = async () => {
                setLoading(true);
                setTimeout(() => {
                    setLoading(false);
                    setStep(6);
                }, 500);
            };

            // ... (generateReportImage, handleDownloadAllImages, handleBackupZip remain same as provided code, ensuring print compatibility) ...

            const dataWithFinancials = mergedData.map(row => ({
                ...row,
                financials: calculateFinancials(row)
            }));

            if (!isLoggedIn) {
                return <Login onLogin={() => setIsLoggedIn(true)} />;
            }

            return (
                <div className="flex h-screen bg-gray-50 font-sans text-gray-900 overflow-hidden">
                    <Sidebar currentView={currentView} setCurrentView={setCurrentView} isCollapsed={isSidebarCollapsed} setIsCollapsed={setIsSidebarCollapsed} />
                    <div className={`flex-1 flex flex-col h-screen overflow-hidden ${isSidebarCollapsed ? 'ml-20' : 'ml-64'} transition-all duration-300 print:ml-0`}>
                        <main className="flex-1 overflow-y-auto bg-gray-50 print:bg-white print:overflow-visible">
                            {currentView === 'quotation' && <QuotationManager />}
                            {currentView === 'settings_sales' && <GenericManager title="業務單位管理" icon="💼" collectionName="sales_units" fields={[{ key: 'name', label: '姓名', required: true }, { key: 'phone', label: '電話' }, { key: 'defaultRatio', label: '預設分紅 (%)', type: 'number', defaultValue: 10 }]} localData={salesUnits} setLocalData={setSalesUnits} currentReportData={dataWithFinancials} />}
                            {currentView === 'settings_construction' && <GenericManager title="施工單位管理" icon="👷" collectionName="construction_units" fields={[{ key: 'name', label: '姓名', required: true }, { key: 'phone', label: '電話' }, { key: 'defaultRatio', label: '預設分紅 (%)', type: 'number', defaultValue: 60 }, { key: 'isInternal', label: '公司內部單位', type: 'boolean', defaultValue: false }]} localData={constructionUnits} setLocalData={setConstructionUnits} currentReportData={dataWithFinancials} />}
                            {currentView === 'shareholder_management' && <GenericManager title="股東管理" icon="👥" collectionName="shareholders" fields={[{ key: 'name', label: '股東姓名', required: true }, { key: 'role', label: '職稱/角色' }, { key: 'shares', label: '投資股數', type: 'number', required: true }, { key: 'ratio', label: '分紅百分比 (%)', type: 'number', required: true }, { key: 'note', label: '備註' }]} enableBatchImport={true} currentReportData={dataWithFinancials} localData={shareholders} setLocalData={setShareholders} />}
                            {currentView === 'department_management' && <DepartmentManager currentData={dataWithFinancials} />}
                            {currentView === 'task_management' && <TaskManager constructionUnits={constructionUnits} salesUnits={salesUnits} tasks={dataWithFinancials} setTasks={setMergedData} />}

                            {/* Process Steps */}
                            {currentView === 'process' && (
                                <div className="max-w-7xl mx-auto px-8 py-8 print:hidden">
                                    <div className="mb-8"><h1 className="text-3xl font-extrabold text-gray-900">派工結算流程</h1><p className="mt-2 text-gray-500">資料僅暫存於當前頁面，刷新即消失。請記得列印或截圖。</p></div>
                                    <div className="mb-8"><div className="flex justify-between max-w-4xl mx-auto relative"><div className="absolute top-1/2 w-full h-1 bg-gray-200 -z-10 rounded"></div>{[{id: 1, name: '上傳'}, {id: 2, name: '核對'}, {id: 3, name: '拆帳'}, {id: 4, name: '分配'}, {id: 5, name: '分紅'}].map(s => (<div key={s.id} className={`flex flex-col items-center bg-gray-50 px-3 ${step >= s.id ? 'text-blue-600' : 'text-gray-400'}`}><div className={`w-8 h-8 rounded-full flex items-center justify-center border-4 transition-all ${step >= s.id ? 'bg-white border-blue-600' : 'bg-white border-gray-300'}`}><span className="text-xs font-bold">{s.id}</span></div><span className="text-xs font-bold mt-1">{s.name}</span></div>))}</div></div>
                                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 min-h-[500px]">
                                        {step === 1 && (<div className="space-y-6 animate-in fade-in slide-in-from-bottom-4"><div className="bg-white border-2 border-dashed border-blue-300 rounded-xl p-10 text-center hover:border-blue-500 transition-all shadow-sm group"><div className="bg-blue-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform duration-300"><span className="text-4xl">📊</span></div><h3 className="text-xl font-bold text-gray-800 mb-2">上傳 Excel 派工檔案</h3><div className="flex justify-center gap-4 mt-4"><div className="relative inline-block"><input type="file" accept=".xlsx, .xls" onChange={handleFileUpload} disabled={!libReady || loading} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"/><button className="px-8 py-3 bg-blue-600 text-white rounded-lg shadow-md hover:bg-blue-700 flex items-center font-medium">{loading ? '處理中...' : '選擇檔案'} {loading && <span className="ml-2 animate-spin">🔄</span>}</button></div></div><p className="text-sm text-gray-500 mt-4">系統將自動讀取 Excel 內容進行計算</p></div>{error && <div className="p-4 bg-red-50 text-red-700 rounded-lg flex items-center border border-red-100"><span className="mr-3">⚠️</span>{error}</div>}</div>)}
                                        {step === 2 && (<div className="space-y-4 animate-in fade-in slide-in-from-bottom-4"><div className="flex justify-between items-center mb-4"><div className="bg-yellow-50 text-yellow-800 px-4 py-2 rounded-lg text-sm border border-yellow-200 flex items-center"><span className="mr-2">⚠️</span>預設勾選：金額 &gt; $500 的項目</div><div className="text-sm text-gray-500">共 {mergedData.length} 筆</div></div><div className="overflow-x-auto border rounded-lg"><table className="min-w-full divide-y divide-gray-200 text-sm"><thead className="bg-gray-50"><tr><th className="px-3 py-3 w-10">選</th><th className="px-3 py-3 text-left font-medium text-gray-500">日期</th><th className="px-3 py-3">任務編號</th><th className="px-3 py-3">內容</th><th className="px-3 py-3 bg-orange-50 text-orange-800">建立人</th><th className="px-3 py-3 bg-green-50 text-green-800">結案人</th><th className="px-3 py-3 text-right">金額</th><th className="px-3 py-3 w-10">刪</th></tr></thead><tbody className="divide-y divide-gray-200">{mergedData.map((row, i) => (<tr key={i} className={row.selected ? 'bg-blue-50/30' : ''}><td className="px-3 py-3 text-center"><input type="checkbox" checked={row.selected} onChange={e=>updateRowData(i,'selected',e.target.checked)} className="h-4 w-4 rounded border-gray-300 text-blue-600"/></td><td className="px-3 py-3 text-gray-500 font-mono text-xs">{row.date}</td><td className="px-3 py-3"><div className="font-medium text-gray-900">{row.id}</div>{row.isDuplicate && <span className="text-xs text-red-600 bg-red-100 px-1 rounded">重複</span>}</td><td className="px-3 py-3 text-gray-500 truncate max-w-[200px]">{row.content}</td><td className="px-3 py-3 bg-orange-50/20">{row.creator}</td><td className="px-3 py-3 bg-green-50/20">{row.closer}</td><td className="px-3 py-3 text-right font-medium">${row.amount.toLocaleString()}</td><td className="px-3 py-3 text-center"><button onClick={()=>{const n=[...mergedData];n.splice(i,1);setMergedData(n)}} className="text-red-400 hover:text-red-600">🗑️</button></td></tr>))}</tbody></table></div><div className="flex justify-between pt-4"><button onClick={()=>{setStep(1);setMergedData([])}} className="text-gray-500 hover:text-gray-900">重新上傳</button><button onClick={()=>setStep(3)} className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md">下一步</button></div></div>)}
                                        {/* Steps 3, 4, 5, 6 remain largely the same, just keeping structure valid */}
                                        {step === 3 && (<div className="space-y-4 animate-in fade-in slide-in-from-bottom-4"><div className="overflow-x-auto overflow-y-visible border rounded-lg"><table className="min-w-full divide-y divide-gray-200 text-sm"><thead className="bg-gray-50"><tr><th className="px-3 py-3 text-left w-24">結案日期</th><th className="px-3 py-3 text-left w-28">分類</th><th className="px-3 py-3 text-left w-32">客戶</th><th className="px-3 py-3 text-right">總金額</th><th className="px-3 py-3 text-left w-48">業務單位 (主導)</th><th className="px-3 py-3 text-left w-48">施工單位</th><th className="px-3 py-3 text-right bg-blue-50 text-blue-800">營業額</th></tr></thead><tbody className="divide-y divide-gray-200">{mergedData.filter(r=>r.selected && !r.isDuplicate).map((row) => { const realIndex = mergedData.findIndex(r => r.id === row.id); const financials = calculateFinancials(row); return (<tr key={row.id}><td className="px-3 py-3 text-gray-500">{row.date}</td><td className="px-3 py-3"><span className="inline-flex px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">{row.category}</span></td><td className="px-3 py-3 font-medium text-gray-700">{row.customerName}</td><td className="px-3 py-3 text-right font-bold text-gray-900">${row.amount.toLocaleString()}</td><td className="px-3 py-3"><select value={row.salesUnitId} onChange={e=>updateRowData(realIndex,'salesUnitId',e.target.value)} className="block w-full border-gray-300 rounded-md text-xs shadow-sm focus:ring-purple-500 focus:border-purple-500 cursor-pointer">{salesUnits.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select><div className="text-xs text-purple-600 mt-1 pl-1">分潤 ({row.salesRatio}%): ${financials.salesCost.toLocaleString()}</div></td><td className="px-3 py-3"><select value={row.constructionUnitId} onChange={e=>updateRowData(realIndex,'constructionUnitId',e.target.value)} className="block w-full border-gray-300 rounded-md text-xs shadow-sm focus:ring-orange-500 focus:border-orange-500 cursor-pointer">{constructionUnits.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select><div className="text-xs text-orange-600 mt-1 pl-1">{financials.isDoloConstruction ? (<span>扣除: ${financials.constructionCost.toLocaleString()} <span className="text-gray-400">(40%)</span></span>) : (<span>扣除: ${financials.constructionCost.toLocaleString()} <span className="text-gray-400">({row.constructionRatio}%)</span></span>)}</div></td><td className="px-3 py-3 text-right bg-blue-50 font-bold text-blue-700">${financials.turnover.toLocaleString()}</td></tr>); })}</tbody><tfoot className="bg-gray-800 text-white"><tr><td colSpan={6} className="px-6 py-4 text-right">本批次總營業額</td><td className="px-6 py-4 text-right text-xl font-bold text-green-400">${mergedData.filter(r=>r.selected && !r.isDuplicate).reduce((acc,r)=>acc+calculateFinancials(r).turnover,0).toLocaleString()}</td></tr></tfoot></table></div><div className="flex justify-between pt-4"><button onClick={()=>setStep(2)} className="text-gray-500 hover:text-gray-900">上一步</button><button onClick={()=>setStep(4)} className="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md">下一步：查看營收分配</button></div></div>)}
                                        {step === 4 && <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4"><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="bg-gradient-to-r from-blue-50 to-indigo-50 border border-blue-200 p-6 rounded-xl flex flex-col items-center"><h3 className="text-lg font-medium text-blue-800 mb-2">本批次總金額</h3><div className="text-4xl font-extrabold text-blue-600 tracking-tight">${mergedData.filter(r=>r.selected&&!r.isDuplicate).reduce((acc,r)=>acc+r.amount,0).toLocaleString()}</div></div><div className="bg-gradient-to-r from-green-50 to-emerald-50 border border-green-200 p-6 rounded-xl flex flex-col items-center"><h3 className="text-lg font-medium text-green-800 mb-2">本批次總營業額</h3><div className="text-4xl font-extrabold text-green-600 tracking-tight">${mergedData.filter(r=>r.selected&&!r.isDuplicate).reduce((acc,r)=>acc+calculateFinancials(r).turnover,0).toLocaleString()}</div></div></div><div className="flex justify-between pt-6"><button onClick={() => setStep(3)} className="text-gray-500 hover:text-gray-900">上一步</button><button onClick={() => setStep(5)} className="px-8 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-md flex items-center font-bold">下一步：股東分紅 <span className="ml-2">➡️</span></button></div></div>}
                                        {step === 5 && <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4"><div className="flex justify-between pt-6"><button onClick={() => setStep(4)} className="text-gray-500 hover:text-gray-900">上一步</button><button onClick={saveToDatabase} disabled={loading} className="px-8 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 shadow-md flex items-center font-bold disabled:opacity-50 disabled:cursor-not-allowed">{loading ? '儲存中...' : '確認結算'} <span className="ml-2">💾</span></button></div></div>}
                                        {step === 6 && <div className="text-center py-20 animate-in zoom-in"><span className="text-6xl mb-4 block">✅</span><h2 className="text-3xl font-bold text-gray-900 mb-2">計算完成！</h2><div className="flex justify-center gap-4 flex-wrap"><button onClick={() => {setStep(1); setMergedData([]); setFileName('');}} className="px-8 py-3 bg-blue-100 text-blue-700 rounded-lg hover:bg-blue-200 font-medium">處理下一份</button></div></div>}
                                    </div>
                                </div>
                            )}

                            {viewingShareholderDetail && (<div className="fixed inset-0 z-[100] bg-gray-500 bg-opacity-75 flex items-center justify-center p-4 print:hidden"><div className="bg-white rounded-lg shadow-xl max-w-2xl w-full p-6 animate-in zoom-in-95 flex flex-col max-h-[80vh]"><div className="flex justify-between items-center mb-4 border-b pb-2"><h3 className="text-lg font-bold text-gray-900">分紅明細: <span className="text-blue-600">{viewingShareholderDetail.name}</span></h3><button onClick={() => setViewingShareholderDetail(null)} className="text-gray-400 hover:text-gray-600">❌</button></div><div className="flex-1 overflow-auto"><table className="min-w-full divide-y divide-gray-200 text-sm"><thead className="bg-gray-50 sticky top-0"><tr><th className="px-4 py-2 text-left">日期</th><th className="px-4 py-2 text-left">任務編號</th><th className="px-4 py-2 text-left">任務分類</th><th className="px-4 py-2 text-right">該案營業額</th><th className="px-4 py-2 text-right">分紅資金池(15%)</th><th className="px-4 py-2 text-right">個人分紅({viewingShareholderDetail.ratio}%)</th></tr></thead><tbody className="divide-y divide-gray-200">{mergedData.filter(r => r.selected && !r.isDuplicate).map(row => { const financials = calculateFinancials(row); const pool = Math.round(financials.turnover * BONUS_RATIOS.dividends); const share = Math.round(pool * (parseFloat(viewingShareholderDetail.ratio)/100)); return (<tr key={row.id}><td className="px-4 py-2 text-gray-500">{row.date}</td><td className="px-4 py-2 font-mono text-xs">{row.id}</td><td className="px-4 py-2">{row.category}</td><td className="px-4 py-2 text-right">${financials.turnover.toLocaleString()}</td><td className="px-4 py-2 text-right text-gray-500">${pool.toLocaleString()}</td><td className="px-4 py-2 text-right font-bold text-green-600">${share.toLocaleString()}</td></tr>); })}</tbody><tfoot className="bg-gray-100 font-bold sticky bottom-0"><tr><td colSpan={5} className="px-4 py-2 text-right">總計</td><td className="px-4 py-2 text-right text-green-700">${Math.round(mergedData.filter(r=>r.selected&&!r.isDuplicate).reduce((acc,r)=>acc+(calculateFinancials(r).turnover * BONUS_RATIOS.dividends),0) * (parseFloat(viewingShareholderDetail.ratio)/100)).toLocaleString()}</td></tr></tfoot></table></div></div></div>)}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

    </script>
</body>
</html>
